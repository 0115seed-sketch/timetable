name: Update OG Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build-og:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate OG image
        env:
          NICE_API_KEY: ${{ secrets.NICE_API_KEY }}
          NEIS_OFFICE_CODE: N10
          NEIS_SCHOOL_CODE: "8140253"
          NEIS_GRADE: "2"
          NEIS_CLASS: "9"
          SCHOOL_LABEL: "천안업성고 2학년 9반"
        run: python scripts/generate_og.py

      - name: Update og:image daily version
        run: |
          TODAY_KST=$(TZ=Asia/Seoul date +%Y%m%d)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${TODAY_KST}-${GITHUB_RUN_NUMBER}"
          else
            VERSION="${TODAY_KST}"
          fi
          sed -i -E "s#(<meta property=\"og:image\" content=\"https://0115seed-sketch.github.io/timetable/assets/og/today_timetable.png)(\?v=[^\"]*)?(\")#\1?v=${VERSION}\3#" index.html

      - name: Commit and push changes
        run: |
          if [ -z "$(git status --porcelain -- assets/og/today_timetable.png index.html)" ]; then
            echo "No changes in OG assets"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/og/today_timetable.png
          git add index.html
          git commit -m "chore: update daily OG image"
          git pull --rebase origin main
          git push origin HEAD:main
